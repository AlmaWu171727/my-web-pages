<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1100" viewBox="0 0 1680 1100" role="img" aria-label="上岸仓生课系统 视频生产 Pipeline v3">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1324"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#162138"/>
      <stop offset="100%" stop-color="#1f2b45"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="preGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="renderGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 14 14" refX="11" refY="7" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 2L11 7L2 12" fill="none" stroke="#93a4be" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text {
        font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      }
      .title {
        font-size: 48px;
        font-weight: 800;
        fill: #f8fafc;
      }
      .subtitle {
        font-size: 24px;
        font-weight: 500;
        fill: #a7b6cc;
      }
      .section-tag {
        font-size: 18px;
        font-weight: 700;
        fill: #dbe7fb;
        letter-spacing: 1px;
      }
      .section-title {
        font-size: 30px;
        font-weight: 800;
        fill: #f8fafc;
      }
      .item {
        font-size: 21px;
        font-weight: 550;
        fill: #d2ddf1;
      }
      .item-strong {
        font-size: 23px;
        font-weight: 700;
        fill: #f8fafc;
      }
      .chip {
        font-size: 16px;
        font-weight: 700;
        fill: #e5edff;
        letter-spacing: 0.8px;
      }
      .small {
        font-size: 18px;
        font-weight: 500;
        fill: #98abc5;
      }
      .note {
        font-size: 20px;
        font-weight: 550;
        fill: #d6e0f3;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1680" height="1100" fill="url(#bg)"/>
  <rect x="24" y="24" width="1632" height="1052" rx="28" fill="none" stroke="#24344f" stroke-width="2"/>

  <text class="title" x="80" y="96">上岸仓生课系统 · 视频生产 Pipeline v3</text>
  <text class="subtitle" x="80" y="136">从“输入试题”到“最终成片”的四段式生产流，突出可读性与交付节点</text>

  <rect x="80" y="174" width="1520" height="146" rx="20" fill="url(#panel)" stroke="#324766" stroke-width="2" filter="url(#shadow)"/>
  <rect x="80" y="174" width="1520" height="44" rx="20" fill="url(#inputGrad)" opacity="0.95"/>
  <text class="section-tag" x="108" y="203">01 输入与校验</text>
  <text class="item-strong" x="108" y="258">输入：题目文本 / 图表图片 / 参数包（课型、风格、讲师模版）</text>
  <text class="item" x="108" y="296">校验：题目有效性校验；失败则终止，成功进入预处理层</text>

  <line x1="840" y1="326" x2="840" y2="368" stroke="#93a4be" stroke-width="2.6" marker-end="url(#arrow)"/>

  <rect x="80" y="372" width="742" height="188" rx="20" fill="url(#panel)" stroke="#2f4761" stroke-width="2" filter="url(#shadow)"/>
  <rect x="80" y="372" width="742" height="44" rx="20" fill="url(#preGrad)" opacity="0.95"/>
  <text class="section-tag" x="108" y="401">02A 图表处理 Skill</text>
  <text class="item-strong" x="108" y="456">Vision 读图 → 提取结构化信息与坐标映射</text>
  <text class="item" x="108" y="494">输出：charts[]、coord_map；仅在题目含图表时触发</text>
  <text class="small" x="108" y="532">用途：后续讲解步骤可精确引用图中位置与数值关系</text>

  <rect x="858" y="372" width="742" height="188" rx="20" fill="url(#panel)" stroke="#2f4761" stroke-width="2" filter="url(#shadow)"/>
  <rect x="858" y="372" width="742" height="44" rx="20" fill="url(#preGrad)" opacity="0.95"/>
  <text class="section-tag" x="886" y="401">02B 母题路由</text>
  <text class="item-strong" x="886" y="456">语义识别题型 → 路由到对应母题策略接口</text>
  <text class="item" x="886" y="494">覆盖：资料 / 数量 / 判断 / 言语 / 常识（含兜底分支）</text>
  <text class="small" x="886" y="532">输出：solution（answer、steps、trap、speed_method）</text>

  <path d="M451 564 L760 630" fill="none" stroke="#93a4be" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M1229 564 L920 630" fill="none" stroke="#93a4be" stroke-width="2.4" marker-end="url(#arrow)"/>

  <rect x="80" y="634" width="1520" height="244" rx="20" fill="url(#panel)" stroke="#355086" stroke-width="2" filter="url(#shadow)"/>
  <rect x="80" y="634" width="1520" height="44" rx="20" fill="url(#agentGrad)" opacity="0.95"/>
  <text class="section-tag" x="108" y="663">03 核心 Agent 协同层</text>

  <rect x="108" y="698" width="476" height="160" rx="14" fill="#243a65" stroke="#4674bf" stroke-width="1.8"/>
  <text class="item-strong" x="132" y="736">Layer 1 讲题课程生成 Agent</text>
  <text class="item" x="132" y="772">定义“讲什么”：节拍结构、知识点拆解、逐字稿草案</text>
  <text class="small" x="132" y="808">产物：beats[]、sentences[]、intent[]</text>
  <text class="small" x="132" y="838">重点：保证逻辑闭环和知识顺序</text>

  <rect x="602" y="698" width="476" height="160" rx="14" fill="#243a65" stroke="#4674bf" stroke-width="1.8"/>
  <text class="item-strong" x="626" y="736">Layer 2 内容设计 Agent</text>
  <text class="item" x="626" y="772">定义“怎么讲”：镜头信息密度、板书节奏、互动节点</text>
  <text class="small" x="626" y="808">产物：scene_plan、timing_plan、visual_plan</text>
  <text class="small" x="626" y="838">重点：信息层级清晰，避免一次堆叠过多内容</text>

  <rect x="1096" y="698" width="476" height="160" rx="14" fill="#243a65" stroke="#4674bf" stroke-width="1.8"/>
  <text class="item-strong" x="1120" y="736">Layer 3 导演 Agent</text>
  <text class="item" x="1120" y="772">定义“做成什么样”：镜头编排、动效策略、音画同步</text>
  <text class="small" x="1120" y="808">产物：director_timeline、shot_list、asset_map</text>
  <text class="small" x="1120" y="838">重点：统一视觉风格，降低割裂感</text>

  <line x1="840" y1="882" x2="840" y2="924" stroke="#93a4be" stroke-width="2.6" marker-end="url(#arrow)"/>

  <rect x="80" y="928" width="1520" height="128" rx="20" fill="url(#panel)" stroke="#5a3f34" stroke-width="2" filter="url(#shadow)"/>
  <rect x="80" y="928" width="1520" height="44" rx="20" fill="url(#renderGrad)" opacity="0.95"/>
  <text class="section-tag" x="108" y="957">04 渲染与交付</text>
  <text class="item-strong" x="108" y="1012">渲染引擎：合成画面、字幕、动效与旁白；统一导出课程视频</text>
  <text class="item" x="108" y="1048">交付：成片 + 元数据（题型、阶段、时长、质量信号）；进入质检与发布链路</text>

  <rect x="1384" y="84" width="216" height="48" rx="24" fill="#17243c" stroke="#36517a" stroke-width="1.5"/>
  <text class="chip" x="1492" y="114" text-anchor="middle">宽版 1680 · 重绘版</text>

  <rect x="1296" y="1000" width="304" height="56" rx="10" fill="#19263d" stroke="#3b567e" stroke-width="1.4"/>
  <text class="note" x="1448" y="1034" text-anchor="middle">可继续加：失败重试 / 人工复核节点</text>
  <text class="small" x="1448" y="1055" text-anchor="middle">当前版聚焦主链路，避免信息过载</text>
</svg>
