<!doctype html>
<html lang="zh-CN">

    }
    .list {
      margin-top: 28px;
      display: grid;
      gap: 14px;
    }
    a.card {

      text-decoration: none;

      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: 0 8px 24px rgba(75, 85, 99, 0.06);
    }
    .name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .meta {
      font-size: 13px;
      color: #6b7280;

<body>
